services:
  lychee:
    container_name: lychee-${SITE_NAME}
    image: lycheeorg/lychee:v7.5.4
    restart: always
    env_file:
      - .env
    volumes:
      - lychee_conf:/conf
      - lychee_uploads:/uploads
      - lychee_sym:/sym
      - lychee_logs:/logs
      - lychee_tmp:/lychee-tmp
    ports:
      - "127.0.0.1:${PORT_MAIN}:80"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:80/livewire/livewire.js > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - xcloud-network

volumes:
  lychee_conf:
  lychee_uploads:
  lychee_sym:
  lychee_logs:
  lychee_tmp:

networks:
  xcloud-network:
    driver: bridge
