services:
  gotify:
    container_name: gotify-${SITE_NAME}
    image: gotify/server:2.9.1
    restart: always
    env_file:
      - .env
    volumes:
      - gotify_data:/app/data
    ports:
      - "127.0.0.1:${PORT_MAIN}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/version > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - xcloud-network

volumes:
  gotify_data:

networks:
  xcloud-network:
    driver: bridge
