services:
  grafana:
    container_name: grafana-${SITE_NAME}
    image: grafana/grafana:12.4
    restart: always
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:${PORT_MAIN}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - xcloud-network

volumes:
  grafana_data:

networks:
  xcloud-network:
    driver: bridge
