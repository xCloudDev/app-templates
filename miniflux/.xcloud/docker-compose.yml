services:
  miniflux:
    container_name: miniflux-${SITE_NAME}
    image: miniflux/miniflux:2.2.19-distroless
    restart: always
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORT_MAIN}:8080"
    healthcheck:
      test: ["CMD", "/usr/bin/miniflux", "-healthcheck", "auto"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - xcloud-network

  db:
    container_name: miniflux-db-${SITE_NAME}
    image: postgres:17.2-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - miniflux_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniflux -d miniflux"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - xcloud-network

volumes:
  miniflux_db_data:

networks:
  xcloud-network:
    driver: bridge
