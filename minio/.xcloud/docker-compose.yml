services:
  minio:
    container_name: minio-${SITE_NAME}
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: always
    env_file:
      - .env
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "0.0.0.0:${PORT_S3}:9000"
      - "0.0.0.0:${PORT_CONSOLE}:9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - xcloud-network

volumes:
  minio_data:

networks:
  xcloud-network:
    driver: bridge
