# xCloud OneClick Template Manifest — schema_version: 1
# yaml-language-server: $schema=https://docs.xcloud.host/schemas/xcloud-template.v1.json
schema_version: 1
slug: minio
name: MinIO
description: 'High-performance S3-compatible object storage. Single-binary, single-tenant — perfect for app backups, static assets, and dev S3 endpoints.'
version: 1.0.0
app_version: 'RELEASE.2025-09-07T16-13-09Z'
icon: assets/icon.png
category: storage
service_class: data_service
runtime: docker_compose
tags:
  - storage
  - s3
  - object-storage
  - backups
files:
  compose: docker-compose.yml
  env: .env
requirements:
  min_ram_mb: 512
  min_cpu_cores: 1
  min_disk_gb: 4
  stack:
    - docker_nginx
ports:
  s3:
    description: 'S3 API endpoint'
    container_port: 9000
    proxy: false
  console:
    description: 'Web console (browser UI)'
    container_port: 9001
    proxy: false
fields:
  - key: admin_user
    label: 'Root user (access key)'
    type: text
    required: true
    default: 'minioadmin'
    validation: 'string|min:3|max:64'
    group: access
  - key: admin_password
    label: 'Root password (secret key)'
    type: password
    required: true
    generate: true
    generate_length: 24
    group: access
field_groups:
  - key: access
    label: 'Root credentials'
    icon: 'xcloud xc-key'
volumes:
  persistent:
    - minio_data
credentials:
  display:
    - label: 'Console URL'
      value: 'http://${SERVER_IP}:${PORT_CONSOLE}'
    - label: 'S3 API endpoint'
      value: 'http://${SERVER_IP}:${PORT_S3}'
    - label: 'Access key'
      value: '${ADMIN_USER}'
    - label: 'Secret key'
      value: '${ADMIN_PASSWORD}'
      secret: true
post_install:
  message: 'MinIO is ready. Open the console at http://${SERVER_IP}:${PORT_CONSOLE} and sign in with the credentials above. Use the S3 endpoint http://${SERVER_IP}:${PORT_S3} from your applications. The console is HTTP only by default — put it behind a reverse proxy with TLS if you expose it to the public internet.'
