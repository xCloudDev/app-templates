services:
  postgres:
    container_name: postgresql-${SITE_NAME}
    image: postgres:17-alpine
    restart: always
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "0.0.0.0:${PORT_POSTGRES}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - xcloud-network

volumes:
  pgdata:

networks:
  xcloud-network:
    driver: bridge
