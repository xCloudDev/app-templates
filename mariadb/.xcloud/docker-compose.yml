services:
  mariadb:
    container_name: mariadb-${SITE_NAME}
    image: mariadb:12.2
    restart: always
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "0.0.0.0:${PORT_MARIADB}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -uroot -p${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - xcloud-network

volumes:
  mariadb_data:

networks:
  xcloud-network:
    driver: bridge
