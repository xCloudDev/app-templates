# xCloud OneClick Template Manifest — schema_version: 1
# yaml-language-server: $schema=https://docs.xcloud.host/schemas/xcloud-template.v1.json
schema_version: 1
slug: mariadb
name: MariaDB
description: 'Open-source relational database and MySQL-compatible drop-in replacement for application workloads.'
version: 1.0.0
app_version: '12.2'
icon: assets/icon.png
category: database
service_class: data_service
runtime: docker_compose
tags:
  - database
  - sql
  - mysql
  - mariadb
  - relational
files:
  compose: docker-compose.yml
  env: .env
requirements:
  min_ram_mb: 512
  min_cpu_cores: 1
  min_disk_gb: 2
  stack:
    - docker_nginx
ports:
  mariadb:
    description: 'MariaDB connection'
    container_port: 3306
    proxy: false
fields:
  -
    key: root_password
    label: 'Root Password (Advanced)'
    type: password
    required: true
    validation: 'string|min:8|max:64'
    generate: true
    generate_length: 24
    group: advanced
  -
    key: admin_user
    label: 'App Username'
    type: text
    required: true
    default: mariadb
    validation: 'string|max:32|alpha_dash'
    group: credentials
  -
    key: admin_password
    label: 'App Password'
    type: password
    required: true
    validation: 'string|min:8|max:64'
    generate: true
    generate_length: 24
    group: credentials
  -
    key: database_name
    label: 'App Database'
    type: text
    required: true
    default: app_db
    validation: 'string|max:64|alpha_dash'
    group: credentials
field_groups:
  -
    key: credentials
    label: 'App Credentials'
    icon: 'xcloud xc-key'
  -
    key: advanced
    label: Advanced
    icon: 'xcloud xc-settings'
volumes:
  persistent:
    - mariadb_data
credentials:
  display:
    -
      label: 'Connection String'
      value: 'mysql://${ADMIN_USER}:${ADMIN_PASSWORD}@${SERVER_IP}:${PORT_MARIADB}/${DATABASE_NAME}'
    -
      label: Host
      value: '${SERVER_IP}'
    -
      label: Port
      value: '${PORT_MARIADB}'
    -
      label: Database
      value: '${DATABASE_NAME}'
    -
      label: 'App Username'
      value: '${ADMIN_USER}'
    -
      label: 'App Password'
      value: '${ADMIN_PASSWORD}'
      secret: true
    -
      label: 'Root Password (Advanced)'
      value: '${ROOT_PASSWORD}'
      secret: true
post_install:
  message: 'MariaDB is running. Use the app credentials below for normal connections. The root password is kept for maintenance and backups. Restrict network access with your firewall before exposing it to untrusted clients.'
