services:
  twofauth:
    container_name: 2fauth-${SITE_NAME}
    image: 2fauth/2fauth:6.1.3
    restart: always
    env_file:
      - .env
    volumes:
      - twofauth_data:/2fauth
    ports:
      - "127.0.0.1:${PORT_MAIN}:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8000/api/v1/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - xcloud-network

volumes:
  twofauth_data:

networks:
  xcloud-network:
    driver: bridge
