services:
  cyberchef:
    container_name: cyberchef-${SITE_NAME}
    image: ghcr.io/gchq/cyberchef:11.0.0
    restart: always
    ports:
      - "127.0.0.1:${PORT_MAIN}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - xcloud-network

networks:
  xcloud-network:
    driver: bridge
