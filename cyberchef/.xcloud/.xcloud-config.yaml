# yaml-language-server: $schema=https://docs.xcloud.host/schemas/xcloud-template.v1.json
schema_version: 1

slug: cyberchef
name: CyberChef
description: 'The Cyber Swiss Army Knife — a web app for encryption, encoding, compression, and data analysis. Originally by GCHQ. Single static container, ~20 MB RAM, zero state.'
version: '1.0.0'
app_version: '11.0.0'
icon: assets/icon.png

category: utilities
service_class: web_app
runtime: docker_compose

tags:
  - utilities
  - crypto
  - encoding
  - data
  - developer-tools

files:
  compose: docker-compose.yml
  env: .env

requirements:
  min_ram_mb: 64
  min_cpu_cores: 1
  min_disk_gb: 1
  stack:
    - docker_nginx

ports:
  main:
    description: 'CyberChef web interface'
    container_port: 8080
    proxy: true

fields: []

credentials:
  display:
    - { label: 'URL', value: 'https://${DOMAIN}' }

post_install:
  message: 'CyberChef is ready at https://${DOMAIN}. There are no accounts, no setup, no admin — just open the URL and start chaining operations. All processing happens in your browser; the server only serves the static app. If you want to gate access, use the Basic Authentication option on this site.'
