x-base: &base
  image: chatwoot/chatwoot:v3.16.0
  env_file: .env
  restart: always
  volumes:
    - storage_data:/app/storage

services:
  rails:
    <<: *base
    container_name: chatwoot-rails-${SITE_NAME}
    depends_on:
      - postgres
      - redis
    ports:
      - '127.0.0.1:${PORT_RAILS}:3000'
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    networks:
      - xcloud-network

  sidekiq:
    <<: *base
    container_name: chatwoot-sidekiq-${SITE_NAME}
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']
    networks:
      - xcloud-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatwoot-postgres-${SITE_NAME}
    restart: always
    environment:
      - POSTGRES_DB=chatwoot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - xcloud-network

  redis:
    image: redis:alpine
    container_name: chatwoot-redis-${SITE_NAME}
    restart: always
    command: 'redis-server --requirepass ${REDIS_PASSWORD}'
    volumes:
      - redis_data:/data
    networks:
      - xcloud-network

volumes:
  storage_data:
  postgres_data:
  redis_data:

networks:
  xcloud-network:
    external: true
