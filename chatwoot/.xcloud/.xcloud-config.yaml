# xCloud OneClick Template Manifest — schema_version: 1
# yaml-language-server: $schema=https://docs.xcloud.host/schemas/xcloud-template.v1.json
#
# Chatwoot — open-source customer engagement platform.
# Multi-service stack: Rails + Sidekiq + Postgres (pgvector) + Redis.
# Requires a one-shot `rails db:chatwoot_prepare` after compose-up,
# wired through the manifest.lifecycle.post_install hook.
schema_version: 1

slug: chatwoot
name: Chatwoot
description: 'Open-source customer engagement platform — chat, email, social inboxes, CRM.'
version: '1.0.0'
app_version: 'v3.16.0'
icon: assets/icon.png

category: communication
service_class: web_app
runtime: docker_compose

tags:
  - chat
  - helpdesk
  - crm
  - support
  - omnichannel

files:
  compose: docker-compose.yml
  env: .env

requirements:
  min_ram_mb: 4096
  min_cpu_cores: 2
  min_disk_gb: 20
  stack:
    - docker_nginx

ports:
  rails:
    description: 'Chatwoot HTTP'
    container_port: 3000
    proxy: true
  postgres:
    description: 'PostgreSQL'
    container_port: 5432
    proxy: false
  redis:
    description: 'Redis'
    container_port: 6379
    proxy: false

fields: []

generated_values:
  secret_key_base:
    type: random
    length: 64
  active_record_encryption_primary_key:
    type: random
    length: 32
  active_record_encryption_deterministic_key:
    type: random
    length: 32
  active_record_encryption_key_derivation_salt:
    type: random
    length: 32
  postgres_password:
    type: random
    length: 32
  redis_password:
    type: random
    length: 24

volumes:
  persistent:
    - storage_data
    - postgres_data
    - redis_data

credentials:
  display:
    -
      label: URL
      value: 'https://${DOMAIN}'

post_install:
  message: 'Chatwoot is ready at https://${DOMAIN}. The first signup becomes the admin account. After onboarding, set ENABLE_ACCOUNT_SIGNUP=false in /var/www/${SITE_NAME}/.env to lock new registrations. Configure outbound email from Chatwoot''s in-app settings or by editing the SMTP_* / MAILER_SENDER_EMAIL keys in the same .env.'

lifecycle:
  post_install:
    fetch: scripts/post-install.sh
