# xCloud OneClick Template Manifest — schema_version: 1
# yaml-language-server: $schema=https://docs.xcloud.host/schemas/xcloud-template.v1.json
schema_version: 1
slug: bookstack
name: BookStack
description: 'Self-hosted documentation and wiki platform. Books → chapters → pages, with a clean WYSIWYG editor and full-text search.'
version: 1.0.0
app_version: '25.05'
icon: assets/icon.png
category: documentation
service_class: web_app
runtime: docker_compose
tags:
  - wiki
  - docs
  - knowledge-base
  - documentation
files:
  compose: docker-compose.yml
  env: .env
requirements:
  min_ram_mb: 1024
  min_cpu_cores: 1
  min_disk_gb: 4
  stack:
    - docker_nginx
ports:
  main:
    description: 'BookStack HTTP'
    container_port: 80
    proxy: true
fields: []
generated_values:
  app_key:
    type: laravel_app_key
  db_root_password:
    type: random
    length: 24
  db_name:
    type: database_name
    prefix: bookstack_
  db_user:
    type: database_user
    prefix: bookstack_
  db_password:
    type: random
    length: 24
volumes:
  persistent:
    - bookstack_config
    - bookstack_db
credentials:
  display:
    - label: 'BookStack URL'
      value: 'https://${DOMAIN}'
    - label: 'Default admin email'
      value: 'admin@admin.com'
    - label: 'Default admin password'
      value: 'password'
      secret: true
post_install:
  message: 'BookStack is ready at https://${DOMAIN}. Sign in with admin@admin.com / password — change both immediately from Settings → Users. The APP_KEY was auto-generated on first start and lives inside the container''s persistent volume; back up the bookstack_config and bookstack_db volumes to preserve full state including encryption keys.'
