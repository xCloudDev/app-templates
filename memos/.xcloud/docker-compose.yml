services:
  memos:
    container_name: memos-${SITE_NAME}
    image: neosmemo/memos:0.28.0
    restart: always
    env_file:
      - .env
    volumes:
      - memos_data:/var/opt/memos
    ports:
      - "127.0.0.1:${PORT_MAIN}:5230"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5230/api/v1/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    networks:
      - xcloud-network

volumes:
  memos_data:

networks:
  xcloud-network:
    driver: bridge
