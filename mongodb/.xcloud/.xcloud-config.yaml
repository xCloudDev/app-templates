# xCloud OneClick Template Manifest — schema_version: 1
# yaml-language-server: $schema=https://docs.xcloud.host/schemas/xcloud-template.v1.json
schema_version: 1
slug: mongodb
name: MongoDB
description: 'Document-oriented NoSQL database with flexible JSON-like documents and horizontal scalability.'
version: 1.0.0
app_version: '8.2'
icon: assets/icon.png
category: database
service_class: data_service
runtime: docker_compose
tags:
  - database
  - nosql
  - document
  - mongodb
files:
  compose: docker-compose.yml
  env: .env
requirements:
  min_ram_mb: 512
  min_cpu_cores: 1
  min_disk_gb: 2
  stack:
    - docker_nginx
ports:
  mongodb:
    description: 'MongoDB connection'
    container_port: 27017
    proxy: false
fields:
  -
    key: admin_user
    label: 'Root Username'
    type: text
    required: true
    default: mongoadmin
    validation: 'string|max:32|alpha_dash'
    group: credentials
  -
    key: admin_password
    label: 'Root Password'
    type: password
    required: true
    validation: 'string|min:8|max:64'
    generate: true
    generate_length: 24
    group: credentials
  -
    key: database_name
    label: 'Default Database'
    type: text
    required: true
    default: app_db
    validation: 'string|max:63|alpha_dash'
    group: credentials
field_groups:
  -
    key: credentials
    label: 'Connection Credentials'
    icon: 'xcloud xc-key'
volumes:
  persistent:
    - mongodb_data
credentials:
  display:
    -
      label: 'Connection String'
      value: 'mongodb://${ADMIN_USER}:${ADMIN_PASSWORD}@${SERVER_IP}:${PORT_MONGODB}/${DATABASE_NAME}?authSource=admin'
    -
      label: Host
      value: '${SERVER_IP}'
    -
      label: Port
      value: '${PORT_MONGODB}'
    -
      label: Database
      value: '${DATABASE_NAME}'
    -
      label: Username
      value: '${ADMIN_USER}'
    -
      label: Password
      value: '${ADMIN_PASSWORD}'
      secret: true
post_install:
  message: 'MongoDB is running. Connection details are shown below. By default, it is only accessible from this server.'
